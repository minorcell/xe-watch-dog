  <!-- Eyes -->
  <circle cx="22" cy="30" r="2.5" fill="#fff" />
  <circle cx="42" cy="30" r="2.5" fill="#fff" />
  <circle cx="22.5" cy="30" r="1.3" fill="#3a2a0a" />
