  <circle cx="21.5" cy="29" r="0.5" fill="#fff" />
  <circle cx="41.5" cy="29" r="0.5" fill="#fff" />

  <!-- Binoculars -->
  <rect x="13" y="19" width="14" height="11" rx="4" fill="#2a2a2a" />
  <rect x="14" y="20" width="12" height="9" rx="3" fill="#3a3a3a" />
  <ellipse cx="20" cy="24.5" rx="4.5" ry="4" fill="#1a1a1a" />
  <ellipse cx="20" cy="24.5" rx="3.5" ry="3" fill="#2a5a7a" opacity="0.7" />
  <ellipse cx="20" cy="24.5" rx="2" ry="1.8" fill="#3a6a8a" opacity="0.5" />
  <ellipse cx="18" cy="23" rx="1.2" ry="0.8" fill="#fff" opacity="0.2" />

  <rect x="37" y="19" width="14" height="11" rx="4" fill="#2a2a2a" />
  <rect x="38" y="20" width="12" height="9" rx="3" fill="#3a3a3a" />
  <ellipse cx="44" cy="24.5" rx="4.5" ry="4" fill="#1a1a1a" />
  <ellipse cx="44" cy="24.5" rx="3.5" ry="3" fill="#2a5a7a" opacity="0.7" />
  <ellipse cx="44" cy="24.5" rx="2" ry="1.8" fill="#3a6a8a" opacity="0.5" />
  <ellipse cx="42" cy="23" rx="1.2" ry="0.8" fill="#fff" opacity="0.2" />

